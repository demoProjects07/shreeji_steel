<!DOCTYPE html>
<html>
<head>
  <title>Product Scanner</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { font-family: Arial; text-align: center; padding: 20px; }
    video, img { width: 90%; max-width: 400px; }
    input, button {
      width: 90%;
      padding: 10px;
      margin: 5px;
    }
  </style>
</head>

<body>

<h2>📷 Scan Product</h2>

<video id="video" autoplay></video>
<br>
<button onclick="capture()">📸 Capture</button>

<img id="preview">

<h3>📦 Product Details</h3>

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="weight" placeholder="Weight">

<button onclick="saveProduct()">💾 Save</button>
<button onclick="searchProduct()">🔍 Search</button>

<script>
let imageData = "";

// Start camera
navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
.then(stream => {
  document.getElementById("video").srcObject = stream;
});

// Capture image
function capture() {
  let video = document.getElementById("video");
  let canvas = document.createElement("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  let ctx = canvas.getContext("2d");
  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/jpeg");
  document.getElementById("preview").src = imageData;
}

// Save product
async function saveProduct() {

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let weight = document.getElementById("weight").value;

  if (!imageData || !name) {
    alert("Capture image and enter name!");
    return;
  }

  await fetch("/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      name: name,
      price: price,
      weight: weight,
      image: imageData
    })
  });

  alert("✅ Saved!");
}

// Search product
async function searchProduct() {

  let name = document.getElementById("name").value;

  let res = await fetch("/search/" + name);
  let data = await res.json();

  if (!data) {
    alert("❌ Not found");
    return;
  }

  alert(
    "📦 Name: " + data.name +
    "\n💰 Price: " + data.price +
    "\n⚖️ Weight: " + data.weight
  );

  document.getElementById("preview").src = data.image;
}
</script>

</body>
</html>
