<!DOCTYPE html>
<html>
<head>
  <title>Product Manager</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background: #f5f6fa;
      padding: 15px;
      margin: 0;
    }

    h2 { text-align: center; }

    .card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    video, img {
      width: 100%;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    .product {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

<h2>📦 Product Manager</h2>

<div class="card">
  <video id="video" autoplay playsinline></video>
  <button onclick="capture()">📸 Capture</button>
  <img id="preview">

  <input id="name" placeholder="Product Name">
  <input id="price" placeholder="Price">
  <input id="weight" placeholder="Weight">

  <button onclick="addProduct()">💾 Save Product</button>
</div>

<h3>📋 All Products</h3>
<div id="list"></div>

<script type="module">

// 🔥 Firebase
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7Cx2Y0OKZpxIz3S02byRs-p5sKrLjeqA",
  authDomain: "product-scanner-f9d84.firebaseapp.com",
  projectId: "product-scanner-f9d84",
  storageBucket: "product-scanner-f9d84.firebasestorage.app",
  messagingSenderId: "33815016634",
  appId: "1:33815016634:web:2210d382e9b781c2be3e83"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📷 Camera (BACK CAMERA FIXED)
let imageData = "";

navigator.mediaDevices.getUserMedia({
  video: { facingMode: { ideal: "environment" } }
})
.then(stream => {
  document.getElementById("video").srcObject = stream;
})
.catch(err => {
  console.log("Camera error:", err);
});

// 📸 Capture
window.capture = function() {
  let video = document.getElementById("video");
  let canvas = document.createElement("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  canvas.getContext("2d").drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/jpeg");
  document.getElementById("preview").src = imageData;
};

// 💾 Save
window.addProduct = async function() {

  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;
  let weight = document.getElementById("weight").value;

  if (!name || !imageData) {
    alert("Please capture image and enter name");
    return;
  }

  await addDoc(collection(db, "products"), {
    name,
    price,
    weight,
    image: imageData
  });

  alert("✅ Saved!");

  // 🔄 Reset form
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("weight").value = "";
  document.getElementById("preview").src = "";
  imageData = "";

  loadProducts();
};

// 📋 Load
async function loadProducts() {

  const querySnapshot = await getDocs(collection(db, "products"));

  let html = "";

  querySnapshot.forEach((docSnap) => {

    let p = docSnap.data();

    html += `
      <div class="product">
        <img src="${p.image}">
        <b>${p.name}</b><br>
        💰 ${p.price}<br>
        ⚖️ ${p.weight}<br>
        <button onclick="deleteProduct('${docSnap.id}')">❌ Delete</button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// ❌ Delete
window.deleteProduct = async function(id) {
  await deleteDoc(doc(db, "products", id));
  loadProducts();
};

// 🚀 Load on start
loadProducts();

</script>

</body>
</html>
